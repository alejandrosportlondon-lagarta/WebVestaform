<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vestaform — We Create Spaces Where People Perform Better</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="project/image-slot.js"></script>

<style>
/* Base tokens, nav, buttons, kicker, footer, a11y → vestaform.css.
   Only page-specific section styles live here. */

/* Hero */
.hero {
  position: relative; width: 100%; height: min(88vh, 800px); min-height: 520px;
  overflow: hidden; background: linear-gradient(135deg, #e8e6e2, #d4d0c8);
}
.hero image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
.hero-overlay {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(to top, rgba(18,12,7,0.76) 0%, rgba(18,12,7,0.34) 42%, rgba(18,12,7,0.06) 70%, rgba(18,12,7,0.12) 100%);
}
.hero-content {
  position: absolute; inset: 0; z-index: 4;
  display: flex; align-items: flex-end; pointer-events: none;
}
.hero-inner {
  max-width: 1240px; width: 100%; margin: 0 auto;
  padding: 0 32px clamp(48px, 7vh, 88px);
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(253,250,243,0.86);
}
.hero-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.hero-h1 {
  font-family: 'Inter Tight', sans-serif; font-weight: 600;
  font-size: clamp(44px, 6.6vw, 92px); line-height: 0.98; letter-spacing: -0.015em;
  color: #fdfaf3; margin: 18px 0 0; max-width: 15ch;
  text-shadow: 0 2px 34px rgba(0,0,0,0.28);
}
.hero-word {
  font-style: italic; color: var(--accent); display: inline-block;
  animation: vfWordIn 0.55s cubic-bezier(0.2,0.7,0.2,1) both;
}
.hero-sub {
  max-width: 54ch; font-size: clamp(16px, 1.5vw, 19px); line-height: 1.55;
  color: rgba(253,250,243,0.86); margin: 22px 0 0;
  text-shadow: 0 1px 16px rgba(0,0,0,0.3);
}
.hero-ctas {
  display: flex; flex-wrap: wrap; gap: 14px; margin-top: 30px;
  pointer-events: auto;
}

/* Showcase section */
.showcase { max-width: 1240px; margin: 0 auto; padding: clamp(64px,8vw,100px) 32px 40px; position: relative; }
.showcase-image-wrap {
  position: relative; height: clamp(280px, 42vw, 520px); border-radius: 6px;
  overflow: hidden; background: linear-gradient(135deg, #e2d8c4, #d8ccb4);
  border: 1px solid #d8d5d0;
}
.showcase-image-wrap img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.showcase-image-sheen {
  position: absolute; inset: 0;
  background-image: linear-gradient(115deg, rgba(255,255,255,0.18), transparent 40%);
  pointer-events: none;
}
.img-badge {
  position: absolute; left: 18px; top: 16px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: #fdfaf3; background: rgba(27,22,17,0.5);
  padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(4px);
}

/* OS Dashboard float */
.os-float {
  position: absolute; right: clamp(8px,3vw,40px); bottom: -36px;
  width: clamp(300px, 40vw, 470px);
  background: #1b1611; border-radius: 10px;
  border: 1px solid #3a2e22;
  box-shadow: 0 30px 60px -20px rgba(40,25,12,0.5), 0 8px 20px -8px rgba(40,25,12,0.4);
  overflow: hidden;
  animation: vfFloat 7s ease-in-out infinite;
}
.os-float-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 1px solid #2e2419;
}
.os-float-title { display: flex; align-items: center; gap: 7px; }
.os-float-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.os-float-name { font-size: 12.5px; font-weight: 600; color: #ece4d6; }
.os-live {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: #7fb98e;
}
.os-live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #58c873;
  animation: vfBlink 1.6s ease-in-out infinite;
}
.os-body { padding: 16px; }
.os-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #8a7d6a; }
.os-project-name { font-size: 17px; font-weight: 600; color: #f3ece0; margin-top: 4px; }
.os-phases { display: flex; gap: 6px; margin-top: 16px; }
.os-phase { flex: 1; }
.os-phase-bar { height: 4px; border-radius: 2px; transform-origin: left; }
.os-phase-label { font-size: 10px; color: #b6a892; margin-top: 6px; }
.os-phase-label-active { color: #f3ece0; font-weight: 600; }
.os-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
.os-card {
  background: #241d15; border: 1px solid #2e2419; border-radius: 7px; padding: 12px;
}
.os-card-label { font-size: 10.5px; color: #8a7d6a; }
.os-card-val { font-size: 19px; font-weight: 700; color: #f3ece0; margin-top: 3px; }
.os-card-val sup { font-size: 12px; color: #8a7d6a; }
.os-card-val-sm { font-size: 14px; font-weight: 600; color: #f3ece0; margin-top: 5px; }
.os-progress-track {
  height: 5px; border-radius: 3px; background: #2e2419; margin-top: 8px; overflow: hidden;
}
.os-progress-fill { height: 100%; background: var(--accent); transform-origin: left; }
.os-badge-green {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
  font-size: 10.5px; font-weight: 600; color: #7fb98e;
  background: rgba(88,200,115,0.12); padding: 3px 7px; border-radius: 20px;
}
.os-badge-green-dot { width: 5px; height: 5px; border-radius: 50%; background: #58c873; }
.os-updates-label { font-size: 10.5px; color: #8a7d6a; margin-top: 16px; }
.os-photos { display: flex; gap: 7px; margin-top: 8px; }
.os-photo { flex: 1; height: 46px; border-radius: 5px; }

/* Declarative band */
.band {
  margin-top: 96px; border-top: 1px solid #e2e0db; border-bottom: 1px solid #e2e0db;
}
.band-inner { max-width: 1240px; margin: 0 auto; padding: 64px 32px; }
.band-text {
  font-family: 'Inter Tight', sans-serif; font-weight: 600;
  font-size: clamp(30px, 4.6vw, 64px); line-height: 1.02; letter-spacing: -0.02em;
  margin: 0; max-width: 18ch;
}
.band-italic { font-style: italic; color: var(--accent); }

/* Model section */
.model-section { max-width: 1240px; margin: 0 auto; padding: 96px 32px; }
.model-intro {
  max-width: 60ch; font-size: 17px; line-height: 1.6; color: #3a3731; margin: 18px 0 0;
}
.model-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 40px; border-bottom: 1px solid #e2e0db; }
.model-tab {
  background: transparent; border: none; cursor: pointer; padding: 12px 18px 14px;
  position: relative; display: flex; align-items: baseline; gap: 8px;
  font-family: 'Schibsted Grotesk', sans-serif;
}
.model-tab-n { font-size: 11px; font-weight: 600; color: #a99c87; transition: color 0.2s; }
.model-tab-label { font-size: 17px; font-weight: 600; color: #6a6560; transition: color 0.2s; }
.model-tab-bar {
  position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
  background: var(--accent); transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.2,0.7,0.2,1);
}
.model-tab.active .model-tab-n { color: var(--accent); }
.model-tab.active .model-tab-label { color: #0f0e0d; }
.model-tab.active .model-tab-bar { transform: scaleX(1); }
.model-panel {
  display: none; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: start;
  padding-top: 40px; animation: vfPanel 0.45s cubic-bezier(0.2,0.7,0.2,1) both;
}
.model-panel.active { display: grid; }
.model-panel-title {
  font-family: 'Inter Tight', sans-serif; font-weight: 600;
  font-size: clamp(26px, 3vw, 40px); line-height: 1.1; letter-spacing: -0.02em;
}
.model-panel-blurb {
  font-size: 18px; line-height: 1.6; color: #3a3731; margin: 16px 0 0; max-width: 44ch;
}
.model-service {
  display: flex; align-items: center; gap: 14px; padding: 16px 0;
  border-bottom: 1px solid #e2e0db;
}
.model-service-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex: none; }
.model-service-name { font-size: 16.5px; font-weight: 500; color: #1a1918; }

/* OS section */
.os-section { max-width: 1240px; margin: 0 auto; padding: 32px 32px 96px; }
.os-panel {
  background: #1b1611; border-radius: 14px; padding: clamp(36px,5vw,72px);
  color: #ece4d6; position: relative; overflow: hidden;
}
.os-panel-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 100% 40px; opacity: 0.6; pointer-events: none;
}
.os-panel-inner {
  position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center;
}
.os-panel-sub { font-size: 17px; line-height: 1.6; color: #c3b6a2; margin: 18px 0 0; max-width: 44ch; }
.os-features { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-top: 32px; }
.os-feature {
  display: flex; align-items: center; gap: 11px; padding: 10px 0;
  border-bottom: 1px solid #2e2419;
}
.os-feature-diamond { color: var(--accent); font-size: 13px; }
.os-feature-label { font-size: 14.5px; color: #ddd1bf; }
.os-dash {
  background: #221b13; border: 1px solid #3a2e22; border-radius: 10px; padding: 20px;
}
.os-dash-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 14px; border-bottom: 1px solid #2e2419;
}
.os-dash-title { font-size: 13px; font-weight: 600; color: #f3ece0; }
.os-dash-quarter { font-size: 11px; color: #8a7d6a; }
.os-row {
  display: flex; align-items: center; gap: 12px; padding: 13px 0;
  border-bottom: 1px solid #2e2419;
}
.os-row-dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }
.os-row-info { flex: 1; min-width: 0; }
.os-row-name { font-size: 13.5px; font-weight: 500; color: #ece4d6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.os-row-meta { font-size: 11px; color: #8a7d6a; }
.os-row-bar-wrap { width: 76px; flex: none; }
.os-row-track { height: 5px; border-radius: 3px; background: #2e2419; overflow: hidden; }
.os-row-fill { height: 100%; background: var(--accent); transform-origin: left; }
.os-row-pct { font-size: 12px; font-weight: 600; color: #c3b6a2; width: 34px; text-align: right; }

/* AI section */
.ai-section { background: #141210; color: #ece4d6; }
.ai-inner { max-width: 1240px; margin: 0 auto; padding: 96px 32px; }
.ai-head { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; align-items: end; margin-top: 16px; }
.ai-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(34px,4.6vw,62px); line-height: 1.02; margin: 0; max-width: 16ch; color: #f6efe3; }
.ai-sub { font-size: 16.5px; line-height: 1.6; color: #b8ab97; margin: 0; }
.ai-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 48px; }
.ai-card {
  background: #2c241a; border: 1px solid #3a2e22; border-radius: 10px; padding: 26px 24px;
  transition: transform 0.25s, border-color 0.25s;
}
.ai-card:hover { transform: translateY(-3px); border-color: #54422c; }
.ai-card-icon {
  width: 34px; height: 34px; border-radius: 7px; background: rgba(189,86,46,0.16);
  display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 15px;
}
.ai-card-title { font-size: 17px; font-weight: 600; color: #f3ece0; margin-top: 18px; }
.ai-card-desc { font-size: 14px; line-height: 1.5; color: #a99c87; margin-top: 7px; }

/* Industries */
.industries-section { max-width: 1240px; margin: 0 auto; padding: 96px 32px; }
.industries-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.industry-card {
  border-radius: 8px; overflow: hidden; border: 1px solid #d8cdb8;
  background: #f2f1ef; transition: border-color 0.2s;
}
.industry-card:hover { border-color: #c2b599; }
.industry-image {
  height: 190px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #e2d8c4, #d6cab1);
}
.industry-image-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
.industry-tag {
  position: absolute; left: 14px; top: 12px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: #fdfaf3; background: rgba(27,22,17,0.5);
  padding: 4px 9px; border-radius: 20px; backdrop-filter: blur(4px);
}
.industry-body { padding: 20px 22px 24px; }
.industry-name { font-size: 19px; font-weight: 600; color: #0f0e0d; }
.industry-desc { font-size: 14.5px; line-height: 1.5; color: #6a6560; margin-top: 6px; }

/* Case study */
.case-section { border-top: 1px solid #e2e0db; }
.case-inner { max-width: 1240px; margin: 0 auto; padding: 96px 32px; }
.case-grid { display: grid; grid-template-columns: 1fr 1.05fr; gap: 56px; align-items: center; }
.case-image-wrap {
  position: relative; height: clamp(320px, 40vw, 480px); border-radius: 8px;
  overflow: hidden; background: linear-gradient(135deg, #ddd2bc, #cdbfa3);
  border: 1px solid #cdbfa3;
}
.case-image-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.case-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(30px,3.8vw,50px); line-height: 1.04; margin: 16px 0 0; max-width: 18ch; }
.case-body { font-size: 17px; line-height: 1.6; color: #3a3731; margin: 18px 0 0; max-width: 48ch; }
.case-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 34px; padding-top: 30px; border-top: 1px solid #e2e0db; }
.metric-n { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: clamp(30px,3.4vw,44px); line-height: 1; letter-spacing: -0.02em; color: var(--accent); }
.metric-l { font-size: 12.5px; line-height: 1.35; color: #6a6560; margin-top: 8px; }
.case-quote { font-family: 'Inter Tight', sans-serif; font-weight: 500; font-style: italic; font-size: 22px; color: #1a1918; margin: 32px 0 0; }

/* Why section */
.why-section { background: #eeece9; }
.why-inner { max-width: 1240px; margin: 0 auto; padding: 96px 32px; }
.why-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(34px,4.4vw,60px); line-height: 1.02; margin: 16px 0 44px; max-width: 16ch; }
.why-table { border-radius: 10px; overflow: hidden; border: 1px solid #d6cab1; }
.why-header { display: grid; grid-template-columns: 1fr 1fr; background: #1b1611; }
.why-col-trad { padding: 18px 26px; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #9a8d77; }
.why-col-vesta { padding: 18px 26px; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #f3ece0; display: flex; align-items: center; gap: 9px; }
.why-col-badge { width: 16px; height: 16px; border-radius: 4px; background: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; }
.why-row { display: grid; grid-template-columns: 1fr 1fr; }
.why-cell-trad { padding: 20px 26px; background: #f0eeeb; border-top: 1px solid #dedbd6; color: #8a8784; font-size: 16px; display: flex; align-items: center; gap: 12px; }
.why-cell-vesta { padding: 20px 26px; background: #f5f4f1; border-top: 1px solid #dedbd6; color: #0f0e0d; font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
.why-cell-vesta:hover { background: #fffdf7; }
.why-x { color: #c4b9a3; font-size: 15px; }
.why-check { color: var(--accent); font-size: 15px; }

/* Vision */
.vision-section { max-width: 1240px; margin: 0 auto; padding: 96px 32px; text-align: center; }
.vision-kicker { display: inline-flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #6a6560; }
.vision-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(36px,5.4vw,76px); line-height: 1.0; letter-spacing: -0.01em; margin: 22px auto 0; max-width: 17ch; }
.vision-sub { font-size: 18px; line-height: 1.6; color: #3a3731; margin: 24px auto 0; max-width: 56ch; }
.vision-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 36px; }
.vision-pill { padding: 9px 20px; border: 1px solid #d0cdc8; border-radius: 30px; font-size: 14.5px; font-weight: 500; color: #1a1918; background: #f0eeeb; }

/* CTA */
.cta-section { max-width: 1240px; margin: 0 auto; padding: 0 32px 96px; }
.cta-panel { background: #1b1611; border-radius: 14px; padding: clamp(48px,7vw,96px); text-align: center; position: relative; overflow: hidden; }
.cta-glow { position: absolute; inset: 0; background-image: radial-gradient(circle at 50% 0%, rgba(189,86,46,0.18), transparent 60%); pointer-events: none; }
.cta-content { position: relative; }
.cta-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(34px,4.6vw,60px); line-height: 1.04; color: #f6efe3; margin: 0 auto; max-width: 18ch; }
.cta-sub { font-size: 18px; line-height: 1.6; color: #b8ab97; margin: 20px auto 0; max-width: 46ch; }
.cta-btn { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; margin-top: 34px; padding: 16px 32px; border-radius: 4px; font-size: 16px; font-weight: 600; background: var(--accent); color: #fdfaf3; transition: opacity 0.15s, transform 0.15s; }
.cta-btn:hover { opacity: 0.92; transform: translateY(-1px); }

/* ── Page-specific responsive (shared nav/footer/a11y/motion → vestaform.css) ── */
@media (max-width: 1024px) {
  .ai-grid { grid-template-columns: repeat(2, 1fr); }
  .industries-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 880px) {
  .model-panel, .os-panel-inner, .case-grid, .ai-head { grid-template-columns: 1fr; gap: 32px; }
  .os-features { grid-template-columns: 1fr 1fr; }
  .os-float {
    position: static; width: 100%; right: auto; bottom: auto; margin-top: 20px;
    animation: none;
  }
}
@media (max-width: 768px) {
  .hero-inner, .band-inner, .model-section, .os-section, .ai-inner, .industries-section,
  .case-inner, .why-inner, .vision-section, .cta-section, .showcase { padding-left: 20px; padding-right: 20px; }
  .ai-grid, .industries-grid, .os-features { grid-template-columns: 1fr; }
  .case-metrics { grid-template-columns: repeat(2, 1fr); }
  .band-inner, .model-section, .os-section, .ai-inner, .industries-section,
  .case-inner, .why-inner, .vision-section { padding-top: 60px; padding-bottom: 60px; }
  .band { margin-top: 64px; }
  .why-cell-trad, .why-cell-vesta, .why-col-trad, .why-col-vesta { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>

<main id="main">
<section class="hero">
  <video autoplay muted loop playsinline style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;">
    <source src="project/images/hero-video.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-inner">
      <div class="hero-eyebrow anim-up">
        <span class="hero-dot"></span>
        <span data-i18n="hero.eyebrow"></span>
      </div>
      <h1 class="hero-h1 anim-up-1">
        <span data-i18n="hero.h1pre"></span><span id="rotating-word" class="hero-word"></span><span data-i18n="hero.h1post"></span>
      </h1>
      <p class="hero-sub anim-up-2" data-i18n="hero.sub"></p>
      <div class="hero-ctas anim-up-3">
        <a href="#contact" class="btn-cta-lg btn-glass">
          <span data-i18n="hero.cta1"></span> <span>→</span>

function renderModelTabs() {
  const tabs = t().model.tabs;

  container.setAttribute('role', 'tablist');
  container.innerHTML = tabs.map((tab, i) => `
    <button class="model-tab${i === activeTab ? ' active' : ''}" onclick="setTab(${i})"
      role="tab" id="model-tab-${i}" aria-controls="model-panel-${i}"

      <span class="model-tab-n">${tab.n}</span>
      <span class="model-tab-label">${tab.label}</span>
      <span class="model-tab-bar"></span>
    </button>
  `).join('');
}

        { name: 'Madrid Flagship',    meta: 'Montaje',    pct: '68%', w: '68%', dot: OS_DOTS[0] },
        { name: 'Barcelona Oeste',    meta: 'Compras',    pct: '41%', w: '41%', dot: OS_DOTS[1] },
        { name: 'Valencia Clínica',   meta: 'Diseño',     pct: '22%', w: '22%', dot: OS_DOTS[2] },
        { name: 'Sevilla HQ',         meta: 'Estrategia', pct: '9%',  w: '9%',  dot: OS_DOTS[3] }
      ]
    : [
        { name: 'Madrid Flagship',    meta: 'Install',     pct: '68%', w: '68%', dot: OS_DOTS[0] },
        { name: 'Barcelona West',     meta: 'Procurement', pct: '41%', w: '41%', dot: OS_DOTS[1] },
        { name: 'Valencia Clinic',    meta: 'Design',      pct: '22%', w: '22%', dot: OS_DOTS[2] },
        { name: 'Sevilla HQ',         meta: 'Strategy',    pct: '9%',  w: '9%',  dot: OS_DOTS[3] }
      ];

  document.getElementById('os-rows').innerHTML = osData.map((r, i) => `
    <div class="os-row">
      <span class="os-row-dot" style="background:${r.dot};"></span>
      <div class="os-row-info">

        </div>
      </div>
      <span class="os-row-pct">${r.pct}</span>
    </div>
  `).join('');
}

// ── i18n flat update ──────────────────────────────────────────────────────────
function updateI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = get(el.dataset.i18n);
    if (val !== undefined) el.textContent = val;
  });
}

// ── Meta / attribute i18n (title, alts, aria-labels) ─────────────────────────
function updateMeta() {
  document.title = t().meta.title;
  const heroImg = document.querySelector('.showcase-image-wrap img');
  if (heroImg) heroImg.alt = t().hero.imgTag;
  const caseImg = document.querySelector('[data-case-img]');
  if (caseImg) caseImg.alt = t().case.imgAlt;
  document.querySelector('.lang-toggle').setAttribute('aria-label', t().a11y.langToggle);
  document.getElementById('nav-toggle').setAttribute('aria-label', t().a11y.menuToggle);
}

// ── Language buttons ──────────────────────────────────────────────────────────
function updateLangButtons() {
  const active = { color: '#0f0e0d', fontWeight: 700 };
  const inactive = { color: '#a99c87', fontWeight: 600 };
  const apply = (el, styles) => Object.assign(el.style, styles);
  const enBtn = document.getElementById('btn-en');
  const esBtn = document.getElementById('btn-es');
  apply(enBtn, lang === 'en' ? active : inactive);
  apply(esBtn, lang === 'es' ? active : inactive);
  enBtn.setAttribute('aria-pressed', lang === 'en');
  esBtn.setAttribute('aria-pressed', lang === 'es');
}

// ── Mobile nav ────────────────────────────────────────────────────────────────
function toggleNav() {
  const nav = document.getElementById('top');
  const btn = document.getElementById('nav-toggle');
  const open = nav.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
}
function closeNav() {
  document.getElementById('top').classList.remove('open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', 'false');
}
document.getElementById('nav-links').addEventListener('click', e => {
  if (e.target.closest('a')) closeNav();
});

// ── Tab keyboard navigation (roving tabindex) ────────────────────────────────
function onTabKey(e, i) {
  const count = t().model.tabs.length;
  let next = null;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = (i + 1) % count;
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = (i - 1 + count) % count;
  else if (e.key === 'Home') next = 0;
  else if (e.key === 'End') next = count - 1;
  if (next === null) return;
  e.preventDefault();
  setTab(next);
  document.getElementById('model-tab-' + next).focus();
}

// ── Word rotation ─────────────────────────────────────────────────────────────
function renderWord() {
  const words = t().hero.words;
  const word = words[wordIdx % words.length];
  const el = document.getElementById('rotating-word');
  // Re-trigger animation by cloning
  const span = el.cloneNode(false);
  span.textContent = word;
  span.style.animation = 'none';
  el.replaceWith(span);
  span.id = 'rotating-word';
  void span.offsetWidth;
  span.style.animation = '';
}

function startWordTimer() {
  if (wordTimer) clearInterval(wordTimer);
  wordTimer = setInterval(() => {
    wordIdx = (wordIdx + 1) % t().hero.words.length;
    renderWord();
  }, 2400);
}

// ── Full render ───────────────────────────────────────────────────────────────
function renderAll() {
  updateI18n();
  updateMeta();
  updateLangButtons();
  renderWord();
  renderModelTabs();
  renderModelPanels();
  renderOsFeatures();
  renderOsRows();
  renderAiGrid();
  renderIndustries();
  renderCaseMetrics();
  renderWhyRows();
  renderVisionPills();
}

// ── Public actions ────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  wordIdx = 0;
  document.documentElement.lang = l;
  renderAll();
}

function setTab(i) {
  activeTab = i;
  renderModelTabs();
  renderModelPanels();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderAll();
startWordTimer();
</script>
</body>
</html>
