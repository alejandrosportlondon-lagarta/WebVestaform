<style>
/* Design-page-only section styles (shared nav/buttons/footer/kicker → vestaform.css) */

/* Hero */
.d-hero { max-width: 1240px; margin: 0 auto; padding: 72px 32px 40px; position: relative; }
.d-hero-grid { position: relative; display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(32px, 5vw, 72px); align-items: center; }
.d-hero-rule { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px); background-size: 100% 88px; opacity: 0.5; pointer-events: none; mask-image: linear-gradient(to bottom, #000 30%, transparent 92%); -webkit-mask-image: linear-gradient(to bottom, #000 30%, transparent 92%); }
.d-hero-eyebrow { display: inline-flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
.d-hero-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.d-hero-h1 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; font-size: clamp(42px, 5.4vw, 78px); line-height: 1.05; letter-spacing: 0; margin: 22px 0 0; max-width: 15ch; color: var(--text-strong); }
.d-hero-h1 em { font-style: italic; color: var(--accent); }
.d-hero-sub { max-width: 50ch; font-size: clamp(16px, 1.5vw, 19px); line-height: 1.55; color: var(--text-secondary); margin: 26px 0 0; }
.d-hero-ctas { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }
.btn-line { padding: 14px 24px; border-radius: 3px; font-size: 15px; font-weight: 600; color: var(--text-strong); border: 1px solid var(--border); background: transparent; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; transition: background 0.15s; }
.btn-line:hover { background: var(--bg-band); }
.d-hero-media { position: relative; }
.d-hero-frame { position: relative; aspect-ratio: 4/5; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: linear-gradient(135deg, var(--sage), var(--stone)); box-shadow: 0 30px 60px -28px rgba(0,20,20,0.4); }
.d-hero-frame image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
.d-img-badge { position: absolute; left: 18px; top: 16px; pointer-events: none; font-size: 11.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--linen); background: rgba(0,35,36,0.55); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
.d-hero-tag { position: absolute; right: -14px; bottom: -18px; background: var(--panel-bg); color: var(--panel-text); border-radius: 8px; padding: 14px 18px; box-shadow: 0 20px 40px -16px rgba(0,20,20,0.5); animation: vfFloat 7s ease-in-out infinite; }
.d-hero-tag-l { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--panel-text-muted); }
.d-hero-tag-v { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; font-weight: 700; margin-top: 2px; }

/* Story (dark) */
.d-story { margin-top: 72px; background: var(--panel-bg-2); color: var(--panel-text); }
.d-story-inner { max-width: 1240px; margin: 0 auto; padding: clamp(56px, 7vw, 96px) 32px; }
.d-story-head { display: grid; grid-template-columns: 1.15fr 1fr; gap: 48px; align-items: end; margin-top: 18px; }
.d-story-h2 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; font-size: clamp(32px, 4.4vw, 60px); line-height: 1.08; letter-spacing: 0; margin: 0; max-width: 16ch; color: var(--panel-text); }
.d-story-h2 em { font-style: italic; color: var(--moss); }
.d-story-body { font-size: 16.5px; line-height: 1.6; color: var(--panel-text-muted); margin: 0; }
.d-pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 48px; }
.d-pillar { background: var(--panel-raised); border: 1px solid var(--panel-border); border-radius: 10px; padding: 28px 26px; }
.d-pillar-n { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; font-size: 30px; color: var(--moss); }
.d-pillar-t { font-size: 18px; font-weight: 600; color: var(--panel-text); margin-top: 14px; }
.d-pillar-d { font-size: 14.5px; line-height: 1.55; color: var(--panel-text-muted); margin-top: 8px; }

/* Capabilities (bone) */
.d-cap { max-width: 1240px; margin: 0 auto; padding: clamp(64px, 8vw, 100px) 32px; }
.d-cap-intro { max-width: 60ch; font-size: 17px; line-height: 1.6; color: var(--text-secondary); margin: 18px 0 0; }
.d-cap-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 44px; }
.d-cap-card { border: 1px solid var(--border); background: var(--card-bg); border-radius: 10px; padding: 24px 22px; transition: border-color 0.2s; }
.d-cap-card:hover { border-color: var(--deep-moss); }
.d-cap-badge { width: 34px; height: 34px; border-radius: 8px; background: var(--accent-tint); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-family: 'Playfair Display', Georgia, serif; font-weight: 700; font-size: 15px; }
.d-cap-t { font-size: 17px; font-weight: 600; color: var(--text-strong); margin-top: 16px; }
.d-cap-d { font-size: 14px; line-height: 1.5; color: var(--text-muted); margin-top: 7px; }

/* CTA (dark panel) */
.d-cta { max-width: 1240px; margin: 0 auto; padding: 0 32px 96px; }
.d-cta-panel { background: var(--panel-bg); border-radius: 14px; padding: clamp(40px,6vw,72px); position: relative; overflow: hidden; }
.d-cta-glow { position: absolute; inset: 0; background-image: radial-gradient(circle at 50% 0%, rgba(235,250,207,0.14), transparent 60%); pointer-events: none; }
.d-cta-content { position: relative; }
.d-cta-h2 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; font-size: clamp(30px,4vw,52px); line-height: 1.08; letter-spacing: 0; color: var(--panel-text); margin: 16px 0 0; max-width: 18ch; }
.d-cta-sub { font-size: 17px; line-height: 1.6; color: var(--panel-text-muted); margin: 18px 0 0; max-width: 52ch; }
.d-cta-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
.d-cta-card { background: var(--panel-raised); border: 1px solid var(--panel-border); border-radius: 10px; padding: 24px 22px; display: flex; flex-direction: column; }
.d-cta-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(161,173,149,0.18); color: var(--moss); display: inline-flex; align-items: center; justify-content: center; }
.d-cta-icon svg { width: 18px; height: 18px; }
.d-cta-card-t { font-size: 17px; font-weight: 600; color: var(--panel-text); margin-top: 16px; }
.d-cta-card-d { font-size: 14px; line-height: 1.5; color: var(--panel-text-muted); margin-top: 7px; flex: 1; }
.d-cta-action { display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; text-decoration: none; font-size: 14.5px; font-weight: 600; color: var(--moss); transition: gap 0.15s; }
.d-cta-action:hover { gap: 12px; }

/* Collection */
.d-col { max-width: 1240px; margin: 0 auto; padding: clamp(64px, 8vw, 100px) 32px 32px; }
.d-col-intro { max-width: 60ch; font-size: 17px; line-height: 1.6; color: var(--text-secondary); margin: 18px 0 0; }
.d-col-controls { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 16px; margin-top: 36px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
.d-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.d-chip { cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 30px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: background 0.2s, border-color 0.2s, color 0.2s; }
.d-chip:hover { border-color: var(--deep-moss); }
.d-chip[aria-pressed="true"] { background: var(--forest); border-color: var(--forest); color: var(--linen); }
.d-viewtoggle { display: inline-flex; align-items: center; gap: 2px; background: var(--sand); border: 1px solid var(--border); border-radius: 30px; padding: 3px; }
.d-view-btn { cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 24px; border: none; background: transparent; color: var(--text-muted); transition: background 0.2s, color 0.2s; }
.d-view-btn[aria-pressed="true"] { background: var(--white); color: var(--text-strong); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
/* detailed view */
.d-prod { display: grid; grid-template-columns: 1.05fr 1fr; gap: clamp(28px, 4vw, 60px); align-items: center; padding: clamp(40px, 5vw, 60px) 0; border-bottom: 1px solid var(--border); animation: vfPanel 0.45s cubic-bezier(0.2,0.7,0.2,1) both; }
.d-prod:nth-child(even) .d-prod-media { order: 2; }
.d-prod-media { position: relative; aspect-ratio: 4/3; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: linear-gradient(135deg, var(--sage), var(--stone)); }
.d-prod-media image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
.d-prod-badge { position: absolute; left: 16px; top: 14px; pointer-events: none; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--linen); background: rgba(0,35,36,0.6); padding: 4px 9px; border-radius: 20px; backdrop-filter: blur(4px); }
.d-prod-tagline { font-size: 12.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
.d-prod-name { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; font-size: clamp(28px, 3.2vw, 42px); line-height: 1.06; letter-spacing: 0; margin: 10px 0 0; color: var(--text-strong); }
.d-prod-desc { font-size: 16.5px; line-height: 1.6; color: var(--text-secondary); margin: 14px 0 0; max-width: 46ch; }
.d-spec { margin: 24px 0 0; }
.d-spec-row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; padding: 13px 0; border-top: 1px solid var(--border); }
.d-spec-row:last-child { border-bottom: 1px solid var(--border); }
.d-spec-row dt { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
.d-spec-row dd { margin: 0; font-size: 15px; color: var(--text); }
.d-prod-req { display: inline-flex; align-items: center; gap: 8px; margin-top: 22px; text-decoration: none; font-size: 14.5px; font-weight: 600; color: var(--accent); transition: gap 0.15s; }
.d-prod-req:hover { gap: 12px; }
/* grid view */
.d-prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
.d-prod-card { border-radius: 9px; overflow: hidden; border: 1px solid var(--border); background: var(--card-bg); transition: border-color 0.2s, transform 0.2s; animation: vfPanel 0.45s cubic-bezier(0.2,0.7,0.2,1) both; }
.d-prod-card:hover { border-color: var(--deep-moss); transform: translateY(-3px); }
.d-prod-card-media { position: relative; aspect-ratio: 4/3; background: linear-gradient(135deg, var(--sage), var(--stone)); }
.d-prod-card-media image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
.d-prod-card-body { padding: 20px 22px 24px; }
.d-prod-card-name { font-size: 19px; font-weight: 600; color: var(--text-strong); }
.d-prod-card-tag { font-size: 12.5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); margin-top: 4px; }
.d-prod-card-mat { font-size: 14px; line-height: 1.5; color: var(--text-muted); margin-top: 10px; }
/* empty state */
.d-empty { text-align: center; padding: clamp(48px, 7vw, 80px) 0; }
.d-empty-t { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; font-size: 26px; color: var(--text-strong); }
.d-empty-d { font-size: 16px; line-height: 1.6; color: var(--text-muted); margin: 12px auto 0; max-width: 44ch; }

/* Responsive */
@media (max-width: 880px) {
  .d-hero-grid, .d-story-head { grid-template-columns: 1fr; gap: 32px; }
  .d-cap-grid { grid-template-columns: repeat(2, 1fr); }
  .d-cta-cards { grid-template-columns: 1fr; }
  .d-pillars { grid-template-columns: 1fr; }
  .d-hero-tag { right: 12px; }
  .d-prod { grid-template-columns: 1fr; gap: 28px; padding: 40px 0; }
  .d-prod:nth-child(even) .d-prod-media { order: 0; }
  .d-prod-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .d-hero, .d-story-inner, .d-cap, .d-cta, .d-col { padding-left: 20px; padding-right: 20px; }
  .d-cap-grid { grid-template-columns: 1fr; }
  .d-prod-grid { grid-template-columns: 1fr; }
  .d-col-controls { flex-direction: column; align-items: flex-start; }
}
</style>

let lang = 'en';
function t() { return T[lang]; }
function get(path) { return path.split('.').reduce((o, k) => o && o[k], t()); }

function updateI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = get(el.dataset.i18n);
    if (v !== undefined) el.textContent = v;
  });
}
function updateLangButtons() {
  const active = { color: 'var(--text-strong)', fontWeight: 700 };
  const inactive = { color: 'var(--text-muted)', fontWeight: 600 };
  const en = document.getElementById('btn-en'), es = document.getElementById('btn-es');
  if (!en || !es) return;
  Object.assign(en.style, lang === 'en' ? active : inactive);
  Object.assign(es.style, lang === 'es' ? active : inactive);
  en.setAttribute('aria-pressed', lang === 'en');
  es.setAttribute('aria-pressed', lang === 'es');
}
function renderLists() {
  document.getElementById('d-pillars').innerHTML = t().story.pillars.map(p => `
    <div class="d-pillar">
      <div class="d-pillar-n">${p.n}</div>
      <div class="d-pillar-t">${p.t}</div>
      <div class="d-pillar-d">${p.d}</div>
    </div>`).join('');
  document.getElementById('d-caps').innerHTML = t().cap.items.map(i => `
    <div class="d-cap-card">
      <div class="d-cap-badge">${i.n}</div>
      <div class="d-cap-t">${i.t}</div>
      <div class="d-cap-d">${i.d}</div>
    </div>`).join('');
  document.getElementById('d-cta-cards').innerHTML = t().cta.cards.map(c => `
    <div class="d-cta-card">
      <div class="d-cta-icon">${ICONS[c.icon] || ''}</div>
      <div class="d-cta-card-t">${c.t}</div>
      <div class="d-cta-card-d">${c.d}</div>
      <a href="../index.html#contact" class="d-cta-action">${c.action} <span>→</span></a>
    </div>`).join('');
}
// ── Collection (filter chips + detailed/grid toggle) ─────────────────────────
let colView = 'detailed';   // 'detailed' | 'grid'
let colFilter = 'all';      // 'all' | category key

function usedCategories() {
  const used = [];
  PRODUCTS.forEach(p => p.cats.forEach(c => { if (!used.includes(c)) used.push(c); }));
  return used;
}
function renderCollection() {
  const c = t().collection;

  // Control bar: filter chips + view toggle
  const chips = ['all', ...usedCategories()].map(k => {
    const label = k === 'all' ? c.all : CATEGORIES[k][lang];
    return `<button class="d-chip" aria-pressed="${colFilter === k}" onclick="setColFilter('${k}')">${label}</button>`;
  }).join('');
  document.getElementById('d-col-controls').innerHTML = `
    <div class="d-chips">${chips}</div>
    <div class="d-viewtoggle" role="group" aria-label="${c.detailed} / ${c.grid}">
      <button class="d-view-btn" aria-pressed="${colView === 'detailed'}" onclick="setColView('detailed')">${c.detailed}</button>
      <button class="d-view-btn" aria-pressed="${colView === 'grid'}" onclick="setColView('grid')">${c.grid}</button>
    </div>`;

  // Results (only the active view is in the DOM → each image-slot id stays unique)
  const list = PRODUCTS.filter(p => colFilter === 'all' || p.cats.includes(colFilter));
  const box = document.getElementById('d-collection');

  if (!list.length) {
    box.innerHTML = `
      <div class="d-empty">
        <div class="d-empty-t">${c.emptyTitle}</div>
        <p class="d-empty-d">${c.emptyBody}</p>
        <a href="../index.html#contact" class="btn-cta-lg btn-glass" style="margin-top:22px">${c.emptyCta} <span>→</span></a>
      </div>`;
    return;
  }

  if (colView === 'grid') {
    box.innerHTML = `<div class="d-prod-grid">` + list.map(p => {
      const x = p[lang];
      return `
      <div class="d-prod-card">
        <div class="d-prod-card-media">
          <image-slot id="${p.slot}" shape="rect" fit="cover" placeholder="Drop ${p.name} photo"></image-slot>
          <div class="d-prod-badge">${CATEGORIES[p.cats[0]][lang]}</div>
        </div>
        <div class="d-prod-card-body">
          <div class="d-prod-card-name">${p.name}</div>
          <div class="d-prod-card-tag">${x.tagline}</div>
          <div class="d-prod-card-mat">${x.materials}</div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  } else {
    box.innerHTML = list.map(p => {
      const x = p[lang];
      return `
      <article class="d-prod">
        <div class="d-prod-media">
          <image-slot id="${p.slot}" shape="rect" fit="cover" placeholder="Drop ${p.name} photo"></image-slot>
          <div class="d-prod-badge">${CATEGORIES[p.cats[0]][lang]}</div>
        </div>
        <div>
          <div class="d-prod-tagline">${x.tagline}</div>
          <h3 class="d-prod-name">${p.name}</h3>
          <p class="d-prod-desc">${x.desc}</p>
          <dl class="d-spec">
            <div class="d-spec-row"><dt>${c.specMaterials}</dt><dd>${x.materials}</dd></div>
            <div class="d-spec-row"><dt>${c.specDimensions}</dt><dd>${x.dimensions}</dd></div>
            <div class="d-spec-row"><dt>${c.specFinishes}</dt><dd>${x.finishes}</dd></div>
          </dl>
          <a href="../index.html#contact" class="d-prod-req">${c.requestThis} <span>→</span></a>
        </div>
      </article>`;
    }).join('');
  }
}
function setColView(v) { colView = v; renderCollection(); }
function setColFilter(f) { colFilter = f; renderCollection(); }

function renderAll() { updateI18n(); updateLangButtons(); renderLists(); renderCollection(); }

// Globals referenced by <site-nav>'s inline handlers
function setLang(l) { lang = l; document.documentElement.lang = l; renderAll(); }
function toggleNav() {
  const nav = document.getElementById('top'), btn = document.getElementById('nav-toggle');
  const open = nav.classList.toggle('open');
  if (btn) btn.setAttribute('aria-expanded', open);
}
function closeNav() {
  document.getElementById('top').classList.remove('open');
  const btn = document.getElementById('nav-toggle');
  if (btn) btn.setAttribute('aria-expanded', 'false');
}
const navLinks = document.getElementById('nav-links');
if (navLinks) navLinks.addEventListener('click', e => { if (e.target.closest('a')) closeNav(); });

renderAll();
</script>
