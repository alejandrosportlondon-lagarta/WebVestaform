<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vestaform Design — Furniture we design and make ourselves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../vestaform.css">
<script src="image-slot.js"></script>

<style>
/* Design-page-only section styles (shared nav/buttons/footer/kicker → vestaform.css) */

/* Hero */
.d-hero { max-width: 1240px; margin: 0 auto; padding: 72px 32px 40px; position: relative; }
.d-hero-grid { position: relative; display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(32px, 5vw, 72px); align-items: center; }
.d-hero-rule { position: absolute; inset: 0; background-image: linear-gradient(#d7cdb8 1px, transparent 1px); background-size: 100% 88px; opacity: 0.5; pointer-events: none; mask-image: linear-gradient(to bottom, #000 30%, transparent 92%); -webkit-mask-image: linear-gradient(to bottom, #000 30%, transparent 92%); }
.d-hero-eyebrow { display: inline-flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #6f6553; }
.d-hero-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.d-hero-h1 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(42px, 5.4vw, 78px); line-height: 0.98; letter-spacing: -0.015em; margin: 22px 0 0; max-width: 15ch; }
.d-hero-h1 em { font-style: italic; color: var(--accent); }
.d-hero-sub { max-width: 50ch; font-size: clamp(16px, 1.5vw, 19px); line-height: 1.55; color: #4a4133; margin: 26px 0 0; }
.d-hero-ctas { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }
.btn-line { padding: 14px 24px; border-radius: 3px; font-size: 15px; font-weight: 600; color: #221c14; border: 1px solid #c9bfa9; background: transparent; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; transition: background 0.15s; }
.btn-line:hover { background: #e6dcc8; }
.d-hero-media { position: relative; }
.d-hero-frame { position: relative; aspect-ratio: 4/5; border-radius: 8px; overflow: hidden; border: 1px solid #d2c7b0; background: linear-gradient(135deg, #e2d8c4, #d8ccb4); box-shadow: 0 30px 60px -28px rgba(40,25,12,0.4); }
.d-hero-frame image-slot { position: absolute; inset: 0; width: 100%; height: 100%; }
.d-img-badge { position: absolute; left: 18px; top: 16px; pointer-events: none; font-size: 11.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #fdfaf3; background: rgba(27,22,17,0.55); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
.d-hero-tag { position: absolute; right: -14px; bottom: -18px; background: #1b1611; color: #f3ece0; border-radius: 8px; padding: 14px 18px; box-shadow: 0 20px 40px -16px rgba(40,25,12,0.5); animation: vfFloat 7s ease-in-out infinite; }
.d-hero-tag-l { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #b6a892; }
.d-hero-tag-v { font-family: 'Inter Tight', sans-serif; font-size: 22px; font-weight: 700; margin-top: 2px; }

/* Story (dark) */
.d-story { margin-top: 72px; background: #221c14; color: #ece4d6; }
.d-story-inner { max-width: 1240px; margin: 0 auto; padding: clamp(56px, 7vw, 96px) 32px; }
.d-story-head { display: grid; grid-template-columns: 1.15fr 1fr; gap: 48px; align-items: end; margin-top: 18px; }
.d-story-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(32px, 4.4vw, 60px); line-height: 1.02; letter-spacing: -0.015em; margin: 0; max-width: 16ch; color: #f6efe3; }
.d-story-h2 em { font-style: italic; color: var(--accent); }
.d-story-body { font-size: 16.5px; line-height: 1.6; color: #b8ab97; margin: 0; }
.d-pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 48px; }
.d-pillar { background: #2c241a; border: 1px solid #3a2e22; border-radius: 10px; padding: 28px 26px; }
.d-pillar-n { font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 30px; color: var(--accent); }
.d-pillar-t { font-size: 18px; font-weight: 600; color: #f3ece0; margin-top: 14px; }
.d-pillar-d { font-size: 14.5px; line-height: 1.55; color: #a99c87; margin-top: 8px; }

/* Capabilities (bone) */
.d-cap { max-width: 1240px; margin: 0 auto; padding: clamp(64px, 8vw, 100px) 32px; }
.d-cap-intro { max-width: 60ch; font-size: 17px; line-height: 1.6; color: #4a4133; margin: 18px 0 0; }
.d-cap-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 44px; }
.d-cap-card { border: 1px solid #d8cdb8; background: #f6f1e7; border-radius: 10px; padding: 24px 22px; transition: border-color 0.2s; }
.d-cap-card:hover { border-color: #c2b599; }
.d-cap-badge { width: 34px; height: 34px; border-radius: 8px; background: rgba(189,86,46,0.14); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-family: 'Inter Tight', sans-serif; font-weight: 700; font-size: 15px; }
.d-cap-t { font-size: 17px; font-weight: 600; color: #221c14; margin-top: 16px; }
.d-cap-d { font-size: 14px; line-height: 1.5; color: #5d5544; margin-top: 7px; }

/* CTA (dark panel) */
.d-cta { max-width: 1240px; margin: 0 auto; padding: 0 32px 96px; }
.d-cta-panel { background: #1b1611; border-radius: 14px; padding: clamp(40px,6vw,72px); position: relative; overflow: hidden; }
.d-cta-glow { position: absolute; inset: 0; background-image: radial-gradient(circle at 50% 0%, rgba(189,86,46,0.18), transparent 60%); pointer-events: none; }
.d-cta-content { position: relative; }
.d-cta-h2 { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: clamp(30px,4vw,52px); line-height: 1.04; color: #f6efe3; margin: 16px 0 0; max-width: 18ch; }
.d-cta-sub { font-size: 17px; line-height: 1.6; color: #b8ab97; margin: 18px 0 0; max-width: 52ch; }
.d-cta-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
.d-cta-card { background: #2c241a; border: 1px solid #3a2e22; border-radius: 10px; padding: 24px 22px; display: flex; flex-direction: column; }
.d-cta-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(189,86,46,0.16); color: var(--accent); display: inline-flex; align-items: center; justify-content: center; }
.d-cta-icon svg { width: 18px; height: 18px; }
.d-cta-card-t { font-size: 17px; font-weight: 600; color: #f3ece0; margin-top: 16px; }
.d-cta-card-d { font-size: 14px; line-height: 1.5; color: #a99c87; margin-top: 7px; flex: 1; }
.d-cta-action { display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; text-decoration: none; font-size: 14.5px; font-weight: 600; color: var(--accent); transition: gap 0.15s; }
.d-cta-action:hover { gap: 12px; }

/* Responsive */
@media (max-width: 880px) {
  .d-hero-grid, .d-story-head { grid-template-columns: 1fr; gap: 32px; }
  .d-cap-grid { grid-template-columns: repeat(2, 1fr); }
  .d-cta-cards { grid-template-columns: 1fr; }
  .d-pillars { grid-template-columns: 1fr; }
  .d-hero-tag { right: 12px; }
}
@media (max-width: 768px) {
  .d-hero, .d-story-inner, .d-cap, .d-cta { padding-left: 20px; padding-right: 20px; }
  .d-cap-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<a href="#main" class="skip-link" data-i18n="a11y.skip">Skip to content</a>

<!-- NAV (rendered by nav.js · single source of truth) -->
<site-nav id="top" data-active="design" data-home="../index.html" data-design-href="design.html"></site-nav>

<main id="main">

  <!-- HERO -->
  <section class="d-hero">
    <div class="d-hero-rule"></div>
    <div class="d-hero-grid">
      <div>
        <div class="d-hero-eyebrow anim-up"><span class="dot"></span><span data-i18n="hero.eyebrow"></span></div>
        <h1 class="d-hero-h1 anim-up-1">
          <span data-i18n="hero.h1a"></span> <em data-i18n="hero.h1b"></em><span data-i18n="hero.h1c"></span>
        </h1>
        <p class="d-hero-sub anim-up-2" data-i18n="hero.sub"></p>
        <div class="d-hero-ctas anim-up-3">
          <a href="../index.html#contact" class="btn-cta-lg btn-glass"><span data-i18n="hero.cta1"></span> <span>→</span></a>
          <a href="#collection" class="btn-line" data-i18n="hero.cta2"></a>
        </div>
      </div>
      <div class="d-hero-media anim-up-4">
        <div class="d-hero-frame">
          <image-slot id="vf-design-hero" shape="rect" fit="cover" placeholder="Drop a flagship product photo"></image-slot>
          <div class="d-img-badge" data-i18n="hero.imgTag"></div>
        </div>
        <div class="d-hero-tag">
          <div class="d-hero-tag-l" data-i18n="hero.badgeLabel"></div>
          <div class="d-hero-tag-v" data-i18n="hero.badgeVal"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- IN-HOUSE STORY -->
  <section class="d-story">
    <div class="d-story-inner">
      <div class="kicker kicker-dark"><span class="kicker-line"></span><span data-i18n="story.kicker"></span></div>
      <div class="d-story-head">
        <h2 class="d-story-h2"><span data-i18n="story.titleA"></span> <em data-i18n="story.titleB"></em></h2>
        <p class="d-story-body" data-i18n="story.body"></p>
      </div>
      <div class="d-pillars" id="d-pillars"></div>
    </div>
  </section>

  <!-- CAPABILITIES -->
  <section id="collection" class="d-cap">
    <div class="kicker"><span class="kicker-line"></span><span data-i18n="cap.kicker"></span></div>
    <h2 class="section-h2" data-i18n="cap.title"></h2>
    <p class="d-cap-intro" data-i18n="cap.intro"></p>
    <div class="d-cap-grid" id="d-caps"></div>
  </section>

  <!-- CTA -->
  <section class="d-cta">
    <div class="d-cta-panel">
      <div class="d-cta-glow"></div>
      <div class="d-cta-content">
        <div class="kicker kicker-dark"><span class="kicker-line"></span><span data-i18n="cap.kicker"></span></div>
        <h2 class="d-cta-h2" data-i18n="cta.title"></h2>
        <p class="d-cta-sub" data-i18n="cta.sub"></p>
        <div class="d-cta-cards" id="d-cta-cards"></div>
      </div>
    </div>
  </section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-logo-area">

    </div>
    <div class="footer-bottom">
      <span>© 2026 Vestaform. <span data-i18n="footer.rights"></span></span>
      <span>Madrid · España</span>
    </div>
  </div>
</footer>

<script>
// ── Translations (Design page) ───────────────────────────────────────────────
// nav.* and a11y.* mirror index.html so the shared <site-nav> renders identically.
const T = {
  en: {
    a11y: { skip: 'Skip to content' },
    nav: { approach: 'Approach', os: 'Vestaform OS', industries: 'Industries', design: 'Vestaform Design', work: 'Work', about: 'Why us', cta: 'Book a Discovery Call' },
    hero: {
      eyebrow: 'Vestaform Design · In-house collection',
      h1a: 'Furniture we', h1b: 'design and make', h1c: ' ourselves.',
      sub: 'Vestaform Design is our own line of products — conceived in our studio and produced in our workshops. Every piece is built to specification, finished to order and ready to scale across your spaces.',
      cta1: 'Request a quote', cta2: 'Browse the collection',
      imgTag: 'Vestaform Design', badgeLabel: 'Designed & made', badgeVal: 'In-house'
    },
    story: {
      kicker: 'Why we make our own',
      titleA: 'We don’t just specify furniture.', titleB: 'We build it.',
      body: 'Owning the design and the manufacturing means we control quality, cost and lead time end to end. No middlemen, no compromise on the brief — just pieces engineered for the way our clients actually use their spaces.',
      pillars: [
        { n: '01', t: 'Our design studio', d: 'Every product starts as a brief and a sketch in-house — designed for real environments, not catalogues.' },
        { n: '02', t: 'Our own manufacturing', d: 'Upholstery, metalwork and finishing under one roof. We control quality and lead times directly.' },
        { n: '03', t: 'Made to specification', d: 'Sizes, fabrics and finishes adapted to each project — with consistency across every unit.' }
      ]
    },
    cap: {
      kicker: 'In-house capability',
      title: 'Options we manufacture ourselves.',
      intro: 'Because production is ours, we can adapt dimensions, upholstery and finishes per project — and deliver them at the scale a multi-site rollout demands.',
      items: [
        { n: 'A', t: 'Upholstery', d: 'Foam cutting, sewing and upholstery in 40+ fabrics and leathers.' },
        { n: 'B', t: 'Metalwork', d: 'Steel frames, legs and bases, powder-coated to any RAL.' },
        { n: 'C', t: 'Woodwork & finishing', d: 'Solid timber, veneer and laminate tops, finished to order.' },
        { n: 'D', t: 'Custom & contract', d: 'Bespoke sizes and contract-grade builds for large rollouts.' }
      ]
    },
    cta: {
      title: 'Bring Vestaform Design into your project.',
      sub: 'Whether you need three chairs or a full fit-out, we design, manufacture and deliver — with full visibility through Vestaform OS.',
      cards: [
        { icon: 'pencil', t: 'Request a quote', d: 'Send us your pieces, quantities and finishes — we’ll price it up.', action: 'Start a quote' },
        { icon: 'download', t: 'Download the catalogue', d: 'The full Vestaform Design range, specs and finish options.', action: 'Get the PDF' },
        { icon: 'diamond', t: 'Book a showroom visit', d: 'See, sit on and feel the collection at our Madrid showroom.', action: 'Book a visit' }
      ]
    },
    footer: { tag: 'We don’t sell furniture. We deliver environments.', rights: 'All rights reserved.' }
  },
  es: {
    a11y: { skip: 'Saltar al contenido' },
    nav: { approach: 'Enfoque', os: 'Vestaform OS', industries: 'Sectores', design: 'Vestaform Design', work: 'Proyectos', about: 'Por qué', cta: 'Reserva una llamada' },
    hero: {
      eyebrow: 'Vestaform Design · Colección propia',
      h1a: 'Mobiliario que', h1b: 'diseñamos y fabricamos', h1c: ' nosotros.',
      sub: 'Vestaform Design es nuestra propia línea de productos — concebida en nuestro estudio y producida en nuestros talleres. Cada pieza se construye a medida, se acaba bajo pedido y está lista para escalar en tus espacios.',
      cta1: 'Pide presupuesto', cta2: 'Ver la colección',
      imgTag: 'Vestaform Design', badgeLabel: 'Diseñado y fabricado', badgeVal: 'En casa'
    },
    story: {
      kicker: 'Por qué fabricamos lo nuestro',
      titleA: 'No solo especificamos mobiliario.', titleB: 'Lo fabricamos.',
      body: 'Controlar el diseño y la fabricación significa controlar la calidad, el coste y los plazos de principio a fin. Sin intermediarios y sin renunciar al brief — piezas pensadas para cómo los clientes usan realmente sus espacios.',
      pillars: [
        { n: '01', t: 'Nuestro estudio', d: 'Cada producto nace de un brief y un boceto en casa — diseñado para entornos reales, no para catálogos.' },
        { n: '02', t: 'Fabricación propia', d: 'Tapicería, metalistería y acabados bajo un mismo techo. Controlamos calidad y plazos directamente.' },
        { n: '03', t: 'Hecho a medida', d: 'Tamaños, tejidos y acabados adaptados a cada proyecto — con consistencia en cada unidad.' }
      ]
    },
    cap: {
      kicker: 'Capacidad propia',
      title: 'Opciones que fabricamos nosotros.',
      intro: 'Como la producción es nuestra, adaptamos dimensiones, tapicería y acabados por proyecto — y los entregamos a la escala que exige un despliegue multisede.',
      items: [
        { n: 'A', t: 'Tapicería', d: 'Corte de espuma, costura y tapizado en +40 tejidos y pieles.' },
        { n: 'B', t: 'Metalistería', d: 'Estructuras, patas y bases de acero, lacadas a cualquier RAL.' },
        { n: 'C', t: 'Madera y acabados', d: 'Tableros de madera maciza, chapa y laminado, acabados bajo pedido.' },
        { n: 'D', t: 'A medida y contract', d: 'Tamaños a medida y construcción contract para grandes despliegues.' }
      ]
    },
    cta: {
      title: 'Lleva Vestaform Design a tu proyecto.',
      sub: 'Tanto si necesitas tres sillas como un proyecto completo, diseñamos, fabricamos y entregamos — con visibilidad total a través de Vestaform OS.',
      cards: [
        { icon: 'pencil', t: 'Pide presupuesto', d: 'Envíanos piezas, cantidades y acabados — lo presupuestamos.', action: 'Iniciar presupuesto' },
        { icon: 'download', t: 'Descarga el catálogo', d: 'Toda la gama Vestaform Design, fichas y opciones de acabado.', action: 'Obtener el PDF' },
        { icon: 'diamond', t: 'Reserva una visita', d: 'Ve, prueba y siente la colección en nuestro showroom de Madrid.', action: 'Reservar visita' }
      ]
    },
    footer: { tag: 'No vendemos muebles. Entregamos entornos.', rights: 'Todos los derechos reservados.' }
  }
};

// SVG icons (no emoji — per UI/UX checklist: vector icons that scale & theme)
const ICONS = {
  pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  diamond: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 22 12 12 22 2 12Z"/></svg>'
};

let lang = 'en';
function t() { return T[lang]; }
function get(path) { return path.split('.').reduce((o, k) => o && o[k], t()); }

function updateI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = get(el.dataset.i18n);
    if (v !== undefined) el.textContent = v;
  });
}
function updateLangButtons() {
  const active = { color: '#221c14', fontWeight: 700 };
  const inactive = { color: '#a99c87', fontWeight: 600 };
  const en = document.getElementById('btn-en'), es = document.getElementById('btn-es');
  if (!en || !es) return;
  Object.assign(en.style, lang === 'en' ? active : inactive);
  Object.assign(es.style, lang === 'es' ? active : inactive);
  en.setAttribute('aria-pressed', lang === 'en');
  es.setAttribute('aria-pressed', lang === 'es');
}
function renderLists() {
  document.getElementById('d-pillars').innerHTML = t().story.pillars.map(p => `
    <div class="d-pillar">
      <div class="d-pillar-n">${p.n}</div>
      <div class="d-pillar-t">${p.t}</div>
      <div class="d-pillar-d">${p.d}</div>
    </div>`).join('');
  document.getElementById('d-caps').innerHTML = t().cap.items.map(i => `
    <div class="d-cap-card">
      <div class="d-cap-badge">${i.n}</div>
      <div class="d-cap-t">${i.t}</div>
      <div class="d-cap-d">${i.d}</div>
    </div>`).join('');
  document.getElementById('d-cta-cards').innerHTML = t().cta.cards.map(c => `
    <div class="d-cta-card">
      <div class="d-cta-icon">${ICONS[c.icon] || ''}</div>
      <div class="d-cta-card-t">${c.t}</div>
      <div class="d-cta-card-d">${c.d}</div>
      <a href="../index.html#contact" class="d-cta-action">${c.action} <span>→</span></a>
    </div>`).join('');
}
function renderAll() { updateI18n(); updateLangButtons(); renderLists(); }

// Globals referenced by <site-nav>'s inline handlers
function setLang(l) { lang = l; document.documentElement.lang = l; renderAll(); }
function toggleNav() {
  const nav = document.getElementById('top'), btn = document.getElementById('nav-toggle');
  const open = nav.classList.toggle('open');
  if (btn) btn.setAttribute('aria-expanded', open);
}
function closeNav() {
  document.getElementById('top').classList.remove('open');
  const btn = document.getElementById('nav-toggle');
  if (btn) btn.setAttribute('aria-expanded', 'false');
}
const navLinks = document.getElementById('nav-links');
if (navLinks) navLinks.addEventListener('click', e => { if (e.target.closest('a')) closeNav(); });

renderAll();
</script>
</body>
</html>
